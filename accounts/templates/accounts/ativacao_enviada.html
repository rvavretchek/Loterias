{% extends 'base.html' %}
{% block title %}Verificar E-mail — Loterias{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card" style="text-align:center">
    <i class="fas fa-envelope-open-text" style="font-size:3rem;color:var(--accent);margin-bottom:1rem"></i>
    <h1>Verifique seu E-mail</h1>
    <p style="color:var(--text-secondary);margin-top:1rem">
      Enviamos um link de ativação para <strong>{{ email }}</strong>.
    </p>
    <p style="color:var(--text-secondary);margin-top:.5rem">
      Verifique sua caixa de entrada (e o spam) e clique no link para ativar sua conta.
    </p>
    <div style="margin-top:2rem">
      <a href="{% url 'accounts:login' %}" class="btn btn-outline">Ir para Login</a>
    </div>
  </div>
</div>
{% endblock %}
