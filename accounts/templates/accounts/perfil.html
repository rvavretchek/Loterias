{% extends 'base.html' %}
{% block title %}Perfil — Loterias{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h1><i class="fas fa-user-cog" style="color:var(--accent)"></i> Meu Perfil</h1>
    <p class="auth-subtitle">{{ user.email }}</p>
    <div class="form-group">
      <label>Nome</label>
      <p style="padding:.7rem 1rem;background:var(--input-bg);border-radius:var(--radius-sm);border:1px solid var(--border)">{{ user.first_name }}</p>
    </div>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="tema">Tema Preferido</label>
        <select name="tema_preferido" id="tema" class="form-select">
          <option value="light" {% if user.tema_preferido == 'light' %}selected{% endif %}>☀️ Claro</option>
          <option value="dark" {% if user.tema_preferido == 'dark' %}selected{% endif %}>🌙 Escuro</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Salvar</button>
    </form>
    <div class="auth-footer">
      <a href="{% url 'accounts:password_reset' %}">Alterar senha</a>
    </div>
  </div>
</div>
{% endblock %}
