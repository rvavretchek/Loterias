{% extends 'base.html' %}
{% block title %}E-mail Enviado — Loterias{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card" style="text-align:center">
    <i class="fas fa-envelope" style="font-size:3rem;color:var(--accent);margin-bottom:1rem"></i>
    <h1>E-mail Enviado</h1>
    <p style="color:var(--text-secondary);margin-top:1rem">Se este e-mail estiver cadastrado, você receberá um link para redefinir sua senha.</p>
    <div style="margin-top:2rem"><a href="{% url 'accounts:login' %}" class="btn btn-outline">Voltar ao Login</a></div>
  </div>
</div>
{% endblock %}
