{% extends 'base.html' %}
{% block title %}Nova Senha — Loterias{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h1>Definir Nova Senha</h1>
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
      <div class="form-group">
        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
        <input type="password" name="{{ field.html_name }}" id="{{ field.id_for_label }}" class="form-input" required>
        {% for error in field.errors %}<p class="form-error">{{ error }}</p>{% endfor %}
      </div>
      {% endfor %}
      <button type="submit" class="btn btn-primary btn-block btn-lg">Redefinir Senha</button>
    </form>
  </div>
</div>
{% endblock %}
