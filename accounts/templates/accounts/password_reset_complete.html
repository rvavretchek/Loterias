{% extends 'base.html' %}
{% block title %}Senha Redefinida — Loterias{% endblock %}
{% block content %}

  <div class="auth-card" style="text-align:center">
    <i class="fas fa-check-circle" style="font-size:3rem;color:var(--success);margin-bottom:1rem"></i>

  </div>

{% endblock %}
