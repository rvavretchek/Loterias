{% extends 'base.html' %}
{% block title %}Recuperar Senha — Loterias{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h1><i class="fas fa-key" style="color:var(--accent)"></i> Recuperar Senha</h1>
    <p class="auth-subtitle">Informe seu e-mail para receber o link de recuperação</p>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_email">E-mail</label>
        <input type="email" name="email" id="id_email" class="form-input" placeholder="seu@email.com" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Enviar Link</button>
    </form>
    <div class="auth-footer"><a href="{% url 'accounts:login' %}">Voltar ao Login</a></div>
  </div>
</div>
{% endblock %}
