{% extends 'base.html' %}
{% load static %}
{% block title %}Novo Jogo — Loterias{% endblock %}
{% block content %}
<div class="page-header">
  <h1><i class="fas fa-dice" style="color:var(--accent)"></i> Gerar Novo Jogo</h1>
  <p>Selecione o tipo de jogo e o número do concurso</p>
</div>

<div style="display:grid;grid-template-columns:1fr 1.5fr;gap:1.5rem">
  <!-- Form -->
  <div class="card">
    <form id="form-novo-jogo" onsubmit="return gerarJogo(this)">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_tipo_jogo">Tipo de Jogo</label>
        {{ form.tipo_jogo }}
      </div>
      <div class="form-group">
        <label for="id_numero_concurso">Número do Concurso</label>
        {{ form.numero_concurso }}
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="btn-gerar">
        <i class="fas fa-magic"></i> Gerar Jogo
      </button>
    </form>
  </div>

  <!-- Result Area -->
  <div class="card game-result" id="game-result-area">
    <div class="empty-state">
      <i class="fas fa-clover"></i>
      <p>Seu jogo aparecerá aqui</p>
    </div>
  </div>
</div>

<style>
@media (max-width:768px) {
  div[style*="grid-template-columns:1fr 1.5fr"] { grid-template-columns: 1fr !important; }
}
</style>
{% endblock %}
